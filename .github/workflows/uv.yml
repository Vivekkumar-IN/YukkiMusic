name: Update deps

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    paths:
      - "pyproject.toml"
      - "**.yml"

jobs:
  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install
        run: pip install uv jq tomlkit

      - name: update
        id: update
        run: |
          uv sync --refresh
          uv pip list --outdated --format json > outdated.json

          python <<EOF
          import json, os
          from pathlib import Path
          import tomlkit

          pyproject_path = Path("pyproject.toml")
          outdated = json.load(open("outdated.json"))
          doc = tomlkit.parse(pyproject_path.read_text())

          sections = [("project", "dependencies"), ("project", "optional-dependencies")]
          updates = []
          changed = 0

          for dep in outdated:
              name = dep["name"]
              current = dep["version"]
              latest = dep["latest_version"]
              for section, key in sections:
                  if section in doc and key in doc[section]:
                      deps = doc[section][key]
                      for i, d in enumerate(deps):
                          if isinstance(d, str) and d.lower().startswith(name.lower()):
                              new_dep = f"{name}=={latest}"
                              if deps[i] != new_dep:
                                  deps[i] = new_dep
                                  changed += 1
                                  updates.append(
                                      f"- `{name}`\n```diff\n- {current}\n+ {latest}\n```"
                                  )

          pyproject_path.write_text(tomlkit.dumps(doc))

          body = "" if not updates else "Updated packages:\n\n" + "\n\n".join(updates)
          title = "Update dependencies" if not changed else f"Update dependencies [{changed} packages]"

          with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
              gh.write(f"updates<<EOF\n{body}\nEOF\n")
              gh.write(f"title={title}\n")
          EOF

          uv lock

      - name: pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update deps"
          title: ${{ steps.update.outputs.title }}
          body: ${{ steps.update.outputs.updates }}
          branch: deps/update-pip-deps
          delete-branch: true
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"